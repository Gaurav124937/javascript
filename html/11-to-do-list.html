        const toDOList =[];

        const inputElement = document.querySelector('.js-input-text');
        const input = inputElement.value;
        toDOList.push(input);
        inputElement.value = '';
        }

        //dueDate:dueDate is same as dueDate
        toDOList.push({name:input, dueDate});
        console.log(toDOList);
        inputElement.value = '';

        // using template string to render the todo list
        function renderTodoList(){
        let  list=``;
         for(let i=0;i<toDOList.length;i++){
            const todoobject = toDOList[i];
            //defrencing the object properties
            //same as const name = todoobject.name; const dueDate = todoobject.dueDate;
            const {name,dueDate } = todoobject;
            
            const html =`
                <div class="todo-item-name">${name}</div> 
                <div class="todo-item-date">${dueDate}</div>
                <div><button class="delete-button" onclick="toDOList.splice(${i},1);
                renderTodoList();">Delete</button></div>`;
            list += html;
            // toDoList.push(html);

         }
            
            document.querySelector('.js-todo-list')
            .innerHTML = list;
