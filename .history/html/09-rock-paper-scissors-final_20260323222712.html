<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/rock-paper-scissors.css">
</head>



<body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="playGame('rock')" class="game-button">
        <img src="images/rock-emoji.png" class="button-emoji"></button>
    <button onclick="playGame('paper')" class="game-button">
        <img src="images/paper-emoji.png" class="button-emoji"></button>
    <button onclick="playGame('scissors')" class="game-button">
        <img src="images/scissors-emoji.png" class="button-emoji"></button>
    <p class="displayresult"></p>
    <p class="choices"></p>
    <p class="js-previous-score previous"> previous score :</p>
    <p class="score-display"></p>
    <button onclick="resetScore() " class="reset-score">Reset score</button>



    <script src="../js/rock-paper-scissors.js"></script>
</body>

</html>
