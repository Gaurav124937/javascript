<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/rock-paper-scisssor-autoplay.css">
</head>



<body>
    <p class="title">Rock Paper Scissors</p>
    <button  class="game-button">
        <img src="../images/rock-emoji.png" class="button-emoji"></button>
    <button onclick="playGame('paper')" class="game-button">
        <img src="../images/paper-emoji.png" class="button-emoji"></button>
    <button onclick="playGame('scissors')" class="game-button">
        <img src="../images/scissors-emoji.png" class="button-emoji"></button>
    <p class="displayresult"></p>
    <p class="choices"></p>
    <p class="js-previous-score previous"> previous score :</p>
    <p class="score-display"></p>
    <button onclick="resetScore() " class="reset-score">Reset score</button>
    <button onclick="autoPlay()" class="auto-play-button">AutoPlay</button>



    <script>
         //use of objects
        //retrieve score from local storage or initialize if not present
        const score =localStorage.getItem('score') ? JSON.parse(localStorage.getItem('score')) : {win:0, lose:0, tie:0};

        updateScoreElement();

        //function to play the game

        function ComputerChoice(){
            let randomNumber = Math.random();
            let ComputerChoice = '';
            if(randomNumber>0 && randomNumber<1/3){
                ComputerChoice = 'rock';
            } else if(randomNumber>1/3 && randomNumber<2/3){
                ComputerChoice = 'paper';
            } else {
                ComputerChoice = 'scissors';
            }
            return ComputerChoice;
        }


        //main game function
        document.querySelector('.rock-button').addEventListener('click', () => playGame('rock'));
        document.querySelector('.paper-button').addEventListener('click', () => playGame('paper'));
        document.querySelector('.scissors-button').addEventListener('click', () => playGame('scissors'));


        function playGame(playerChoice){
            document.querySelector('.previous-score').innerHTML='';


            let returnedComputerChoice = ComputerChoice();
            
            //function to compare choices and determine result
            function copmarison(){
                let result = '';
                if(playerChoice===returnedComputerChoice){
                score.tie++;
                result ="it's a tie";
            } else if(
                (playerChoice==='rock' && returnedComputerChoice==='scissors') ||
                (playerChoice==='paper' && returnedComputerChoice==='rock') ||
                (playerChoice==='scissors' && returnedComputerChoice==='paper')
            ){
                score.win++;
                result = "you win";
            } else {
                score.lose++;
                result = "you lose";
            }
            //store score in local storage
            localStorage.setItem('score', JSON.stringify(score));
            return result;
            }




            //display results on the webpage
            document.querySelector('.displayresult').innerText = copmarison();
            
            //display choices
            document.querySelector('.choices').innerText = `You chose: ${playerChoice} | Computer chose: ${returnedComputerChoice}`;
            
            //display score
            updateScoreElement();
            
            
             
        }
        //function to reset score
        function resetScore(){
            score.win = 0;
            score.lose = 0;
            score.tie = 0;
            localStorage.removeItem('score');
            alert(`Scores have been reset.`);
            updateScoreElement();
            document.querySelector('.choices').innerText = '';

        }

        function updateScoreElement(){
                document.querySelector('.score-display').innerText = `Win: ${score.win} | Lose: ${score.lose} | Tie: ${score.tie}`;
            }
    </script>
</body>
    

</html>
