<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <button onclick="playGame('rock')">Rock</button>
    <button onclick="playGame('paper')">Paper</button>
    <button onclick="playGame('scissors')">Scissors</button>
    <button onclick="resetScore()">Reset score</button>
    <script>

        //use of objects
        //retrieve score from local storage or initialize if not present
        const score =localStorage.getItem('score') ? JSON.parse(localStorage.getItem('score')) : {win:0, lose:0, tie:0};

        //function to play the game
        function playGame(playerChoice){
            let randomNumber = Math.random();
            let ComputerChoice = '';
            if(randomNumber>0 && randomNumber<1/3){
                ComputerChoice = 'rock';
            } else if(randomNumber>1/3 && randomNumber<2/3){
                ComputerChoice = 'paper';
            } else {
                ComputerChoice = 'scissors';
            }
            if(playerChoice===ComputerChoice){
                score.tie++;
                alert(`It is a tie! \n win:${score.win} lose:${score.lose} tie:${score.tie}`);
            } else if(
                (playerChoice==='rock' && ComputerChoice==='scissors') ||
                (playerChoice==='paper' && ComputerChoice==='rock') ||
                (playerChoice==='scissors' && ComputerChoice==='paper')
            ){
                score.win++;
                alert(`You win! your choice was ${playerChoice} and the computer chose ${ComputerChoice} \n win:${score.win} lose:${score.lose} tie:${score.tie}`);
            } else {
                score.lose++;
                alert(`You lose! your choice was ${playerChoice} and the computer chose ${ComputerChoice} \n win:${score.win} lose:${score.lose} tie:${score.tie}`);
            }
            
            //store score in local storage
            localStorage.setItem('score', JSON.stringify(score));
             
        }

        function resetScore(){
            score.win = 0;
            score.lose = 0;
            score.tie = 0;
            localStorage.removeItem('score');
            alert(`Scores have been reset. \n win:${score.win} lose:${score.lose} tie:${score.tie}`);
        }
                   
    </script>
</body>
</html>
