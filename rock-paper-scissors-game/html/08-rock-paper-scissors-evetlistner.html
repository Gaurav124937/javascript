<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/rock-paper-scisssor-autoplay.css">
</head>



<body>
    <p class="title">Rock Paper Scissors</p>
    <p class="instructions">Enter your choice by clicking a button or pressing a key:</p>
    <p class="instructions">r or R for Rock</p>
    <p class="instructions">p or P for Paper</p>
    <p class="instructions">s or S for Scissors</p>
    <button  class="game-button rock-button">
        <img src="../images/rock-emoji.png" class="button-emoji"></button>
    <button  class="game-button paper-button">
        <img src="../images/paper-emoji.png" class="button-emoji"></button>
    <button  class="game-button scissors-button">
        <img src="../images/scissors-emoji.png" class="button-emoji"></button>
    <p class="displayresult"></p>
    <p class="choices"></p>
    <p class="js-previous-score previous"> previous score :</p>
    <p class="score-display"></p>
    <button onclick="resetScore() " class="reset-score">Reset score</button>
    <button onclick="autoPlay()" class="auto-play-button">AutoPlay</button>
    <script src="../js/rock-paper-scisssor-autoplay-eventlistner.js"></script>
</body>
    

</html>
